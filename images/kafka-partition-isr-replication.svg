<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="repl" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="400" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Partition 0 — Leader, Followers, and the ISR</text>

  <!-- Broker 1 leader -->
  <rect x="60" y="70" width="200" height="90" rx="8" fill="#eafaf1" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="160" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Broker 1</text>
  <text x="160" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">LEADER</text>
  <text x="160" y="132" text-anchor="middle" font-size="11" fill="#333">serves all reads/writes</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#333">for Partition 0</text>

  <!-- Broker 2 follower in ISR -->
  <rect x="300" y="70" width="200" height="90" rx="8" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Broker 2</text>
  <text x="400" y="113" text-anchor="middle" font-size="12" fill="#2c5aa0">follower (in ISR)</text>
  <text x="400" y="132" text-anchor="middle" font-size="11" fill="#333">caught up, eligible</text>
  <text x="400" y="148" text-anchor="middle" font-size="11" fill="#333">for leader promotion</text>

  <!-- Broker 3 follower lagging, out of ISR -->
  <rect x="540" y="70" width="200" height="90" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="640" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Broker 3</text>
  <text x="640" y="113" text-anchor="middle" font-size="12" fill="#c0392b">follower (OUT of ISR)</text>
  <text x="640" y="132" text-anchor="middle" font-size="11" fill="#333">fell behind (lag/GC/network)</text>
  <text x="640" y="148" text-anchor="middle" font-size="11" fill="#333">excluded until it catches up</text>

  <!-- Replication arrows -->
  <path d="M260,115 L298,115" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#repl)"/>
  <text x="270" y="105" font-size="10" fill="#2e7d32">replicates</text>
  <path d="M500,115 L538,115" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" fill="none" marker-end="url(#repl)"/>
  <text x="505" y="105" font-size="10" fill="#c0392b">lagging</text>

  <!-- ISR box -->
  <rect x="130" y="210" width="340" height="60" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="300" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">ISR = { Broker 1 (leader), Broker 2 }</text>
  <text x="300" y="255" text-anchor="middle" font-size="11" fill="#333">acks=all only waits for THIS set — not literally every replica</text>

  <line x1="160" y1="160" x2="220" y2="208" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="160" x2="380" y2="208" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="60" y="300" width="640" height="65" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="380" y="323" text-anchor="middle" font-size="13" fill="#1a1a1a">If min.insync.replicas=2 and the ISR shrinks to just the leader, acks=all writes</text>
  <text x="380" y="343" text-anchor="middle" font-size="13" fill="#1a1a1a">start failing with NotEnoughReplicasException — a safety mechanism, not a bug.</text>

  <text x="380" y="388" text-anchor="middle" font-size="12" fill="#555">Broker 3 rejoins the ISR automatically once it catches back up to the leader.</text>
</svg>
