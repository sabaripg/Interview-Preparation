<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Offset Commit Timing — Which Failure Mode You Get</text>

  <!-- At-most-once timeline -->
  <text x="40" y="65" font-size="14" font-weight="700" fill="#c0392b">Commit BEFORE processing (at-most-once)</text>
  <line x1="40" y1="90" x2="700" y2="90" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="90" r="6" fill="#c79a1e"/><text x="150" y="112" text-anchor="middle" font-size="11">1. commit offset</text>
  <circle cx="350" cy="90" r="6" fill="#c0392b"/><text x="350" y="112" text-anchor="middle" font-size="11">2. CRASH mid-process</text>
  <circle cx="550" cy="90" r="6" fill="#999"/><text x="550" y="112" text-anchor="middle" font-size="11">3. restart, skips this record</text>
  <text x="380" y="135" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="700">→ record is LOST, never reprocessed</text>

  <line x1="40" y1="160" x2="720" y2="160" stroke="#ddd" stroke-width="1"/>

  <!-- At-least-once timeline -->
  <text x="40" y="195" font-size="14" font-weight="700" fill="#2e7d32">Commit AFTER processing (at-least-once)</text>
  <line x1="40" y1="220" x2="700" y2="220" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="220" r="6" fill="#2c5aa0"/><text x="150" y="242" text-anchor="middle" font-size="11">1. process record</text>
  <circle cx="350" cy="220" r="6" fill="#c0392b"/><text x="350" y="242" text-anchor="middle" font-size="11">2. CRASH before commit</text>
  <circle cx="550" cy="220" r="6" fill="#999"/><text x="550" y="242" text-anchor="middle" font-size="11">3. restart, REPROCESSES it</text>
  <text x="380" y="265" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="700">→ record is DUPLICATED, never lost</text>

  <rect x="40" y="290" width="680" height="55" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="380" y="313" text-anchor="middle" font-size="13" fill="#1a1a1a">Auto-commit fires on a wall-clock timer, not "after this record is done" —</text>
  <text x="380" y="333" text-anchor="middle" font-size="13" fill="#1a1a1a">closer to the at-most-once failure mode than most people assume.</text>
</svg>
