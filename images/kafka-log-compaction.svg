<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Log Compaction — Keep Only the Latest Value Per Key</text>

  <text x="40" y="65" font-size="13" font-weight="700" fill="#333">Before compaction:</text>
  <g font-family="Consolas, monospace" font-size="13">
    <rect x="40" y="75" width="90" height="34" fill="#f2f2f2" stroke="#999"/><text x="85" y="97" text-anchor="middle">K1:V1</text>
    <rect x="135" y="75" width="90" height="34" fill="#f2f2f2" stroke="#999"/><text x="180" y="97" text-anchor="middle">K2:V1</text>
    <rect x="230" y="75" width="90" height="34" fill="#f2f2f2" stroke="#999"/><text x="275" y="97" text-anchor="middle">K1:V2</text>
    <rect x="325" y="75" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="370" y="97" text-anchor="middle">K3:V1</text>
    <rect x="420" y="75" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="465" y="97" text-anchor="middle">K1:V3</text>
    <rect x="515" y="75" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="560" y="97" text-anchor="middle">K2:V2</text>
  </g>
  <text x="40" y="130" font-size="11" fill="#333">Green = latest value for that key (survives compaction). Grey = older, superseded (discarded).</text>

  <line x1="40" y1="150" x2="700" y2="150" stroke="#ddd"/>

  <text x="40" y="180" font-size="13" font-weight="700" fill="#333">After compaction:</text>
  <g font-family="Consolas, monospace" font-size="13">
    <rect x="230" y="190" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="275" y="212" text-anchor="middle">K3:V1</text>
    <rect x="325" y="190" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="370" y="212" text-anchor="middle">K1:V3</text>
    <rect x="420" y="190" width="90" height="34" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/><text x="465" y="212" text-anchor="middle">K2:V2</text>
  </g>

  <rect x="40" y="245" width="680" height="55" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="380" y="268" text-anchor="middle" font-size="13" fill="#1a1a1a">A null-value record (tombstone) removes a key entirely after compaction —</text>
  <text x="380" y="288" text-anchor="middle" font-size="13" fill="#1a1a1a">used by Kafka Streams KTable changelog topics to rebuild state on restart.</text>
</svg>
