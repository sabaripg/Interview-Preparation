<svg viewBox="0 0 620 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="620" height="520" fill="#ffffff"/>
  <text x="310" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Compare-And-Swap (CAS) Flow</text>

  <!-- Start -->
  <rect x="220" y="55" width="180" height="40" rx="20" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="310" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Thread wants to update value</text>

  <path d="M310,95 L310,125" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Read -->
  <rect x="200" y="130" width="220" height="45" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="310" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">READ current value V</text>
  <text x="310" y="168" text-anchor="middle" font-size="11" fill="#555">e.g. V = 5</text>

  <path d="M310,175 L310,205" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Compare (diamond) -->
  <polygon points="310,210 410,260 310,310 210,260" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">COMPARE</text>
  <text x="310" y="272" text-anchor="middle" font-size="11" fill="#333">V == expected?</text>

  <!-- Yes branch -->
  <path d="M410,260 L470,260" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="440" y="248" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">yes</text>

  <rect x="440" y="285" width="150" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="515" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">SWAP</text>
  <text x="515" y="324" text-anchor="middle" font-size="11" fill="#333">write new value</text>
  <path d="M470,265 L515,285" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <rect x="440" y="365" width="150" height="45" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="515" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">SUCCESS — done</text>
  <path d="M515,340 L515,365" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- No branch -->
  <path d="M210,260 L120,260" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="165" y="248" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="600">no</text>

  <rect x="30" y="235" width="145" height="55" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="102" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#7a1f16">Someone else</text>
  <text x="102" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="#7a1f16">changed V first</text>
  <path d="M120,260 L102,260" stroke="#c0392b" stroke-width="0" fill="none"/>

  <!-- retry loop back to READ -->
  <path d="M102,235 C 102,120 130,130 200,150" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="115" y="150" font-size="12" fill="#c0392b" font-weight="600">retry</text>

  <text x="310" y="470" text-anchor="middle" font-size="12" fill="#555">No lock is ever taken — a failed CAS just means "someone else got there first," so the thread</text>
  <text x="310" y="490" text-anchor="middle" font-size="12" fill="#555">re-reads the current value and tries again, instead of blocking.</text>
</svg>
