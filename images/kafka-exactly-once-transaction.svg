<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="tflow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Exactly-Once: Read-Process-Write in One Atomic Transaction</text>

  <rect x="30" y="65" width="150" height="55" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="105" y="97" text-anchor="middle" font-size="12" font-weight="700">Consume from</text>
  <text x="105" y="112" text-anchor="middle" font-size="11">input-topic</text>

  <rect x="230" y="65" width="150" height="55" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="305" y="97" text-anchor="middle" font-size="12" font-weight="700">Transform</text>
  <text x="305" y="112" text-anchor="middle" font-size="11">beginTransaction()</text>

  <rect x="430" y="65" width="150" height="55" rx="6" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/>
  <text x="505" y="97" text-anchor="middle" font-size="12" font-weight="700">Produce to</text>
  <text x="505" y="112" text-anchor="middle" font-size="11">output-topic</text>

  <rect x="630" y="65" width="110" height="55" rx="6" fill="#f3e9fb" stroke="#7b3fa0" stroke-width="2"/>
  <text x="685" y="97" text-anchor="middle" font-size="11" font-weight="700">sendOffsets</text>
  <text x="685" y="112" text-anchor="middle" font-size="11">ToTransaction()</text>

  <path d="M180,92 L228,92" stroke="#2c5aa0" stroke-width="2" fill="none" marker-end="url(#tflow)"/>
  <path d="M380,92 L428,92" stroke="#2c5aa0" stroke-width="2" fill="none" marker-end="url(#tflow)"/>
  <path d="M580,92 L628,92" stroke="#2c5aa0" stroke-width="2" fill="none" marker-end="url(#tflow)"/>

  <rect x="230" y="150" width="330" height="50" rx="6" fill="#eafaf1" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="395" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">commitTransaction() — ALL OR NOTHING</text>

  <path d="M105,120 C 105,170 200,175 228,175" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>
  <path d="M685,120 C 685,170 590,175 562,175" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" fill="none"/>

  <rect x="60" y="230" width="640" height="80" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="380" y="253" text-anchor="middle" font-size="13" fill="#1a1a1a">The produced output record AND the consumer offset commit succeed together</text>
  <text x="380" y="273" text-anchor="middle" font-size="13" fill="#1a1a1a">or neither does. A crash mid-transaction leaves it incomplete — restart</text>
  <text x="380" y="293" text-anchor="middle" font-size="13" fill="#1a1a1a">reprocesses the input, but idempotence dedupes the output.</text>

  <text x="380" y="335" text-anchor="middle" font-size="12" fill="#555">Downstream consumers must set isolation.level=read_committed to actually see this guarantee.</text>
</svg>
