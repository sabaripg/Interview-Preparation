<svg viewBox="0 0 980 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="380" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">CompletableFuture — Chaining Flow</text>

  <!-- supplyAsync -->
  <rect x="20" y="90" width="150" height="55" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="95" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">supplyAsync()</text>
  <text x="95" y="130" text-anchor="middle" font-size="10" fill="#333">runs on another thread</text>

  <path d="M170,117 L215,117" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- thenApply -->
  <rect x="215" y="90" width="150" height="55" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="290" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">thenApply()</text>
  <text x="290" y="130" text-anchor="middle" font-size="10" fill="#333">transform result → value</text>

  <path d="M365,117 L410,117" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- thenCompose -->
  <rect x="410" y="90" width="160" height="55" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="490" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">thenCompose()</text>
  <text x="490" y="130" text-anchor="middle" font-size="10" fill="#333">chain another async call</text>

  <path d="M570,117 L615,117" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- thenCombine -->
  <rect x="615" y="90" width="160" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="695" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">thenCombine()</text>
  <text x="695" y="130" text-anchor="middle" font-size="10" fill="#333">merge with 2nd future</text>

  <!-- second independent future feeding into thenCombine -->
  <rect x="615" y="20" width="160" height="45" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="695" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">supplyAsync() #2</text>
  <text x="695" y="57" text-anchor="middle" font-size="10" fill="#333">independent, runs in parallel</text>
  <path d="M695,65 L695,90" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <path d="M775,117 L820,117" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- thenAccept -->
  <rect x="820" y="90" width="140" height="55" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="890" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">thenAccept()</text>
  <text x="890" y="130" text-anchor="middle" font-size="10" fill="#333">consume final result</text>

  <!-- exceptionally branch -->
  <path d="M490,145 L490,220" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowRed)"/>
  <rect x="380" y="225" width="220" height="55" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="490" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#7a1f16">exceptionally() / handle()</text>
  <text x="490" y="265" text-anchor="middle" font-size="10" fill="#7a1f16">recover from failure at any step</text>

  <text x="490" y="330" text-anchor="middle" font-size="12" fill="#555">Solid arrows: normal chain. Dashed red: exception path can be attached at any point in the chain.</text>
  <text x="490" y="350" text-anchor="middle" font-size="12" fill="#555">Each box runs asynchronously — no thread blocks waiting for the previous step.</text>
</svg>
