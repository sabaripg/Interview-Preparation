<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">The String Pool — Why "a"+"b"=="ab" but new String("ab")!="ab"</text>

  <!-- Pool box -->
  <rect x="60" y="60" width="300" height="160" rx="8" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="210" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">String Pool (heap, since Java 7)</text>

  <rect x="90" y="100" width="240" height="34" rx="4" fill="#fff" stroke="#2c5aa0"/>
  <text x="210" y="122" text-anchor="middle" font-size="13" font-family="Consolas, monospace">"ab"</text>

  <!-- Literal + compile-time concat point to same pool entry -->
  <text x="210" y="160" text-anchor="middle" font-size="12" fill="#333">both point HERE:</text>
  <text x="210" y="178" text-anchor="middle" font-size="12" font-family="Consolas, monospace" fill="#2e7d32">String s1 = "ab";</text>
  <text x="210" y="196" text-anchor="middle" font-size="12" font-family="Consolas, monospace" fill="#2e7d32">String s2 = "a"+"b"; // folded at COMPILE time</text>

  <!-- Heap (non-pool) box -->
  <rect x="420" y="60" width="280" height="160" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="560" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Ordinary Heap (NOT pooled)</text>

  <rect x="450" y="100" width="220" height="34" rx="4" fill="#fff" stroke="#c0392b"/>
  <text x="560" y="122" text-anchor="middle" font-size="13" font-family="Consolas, monospace">"ab" (separate object)</text>

  <text x="560" y="160" text-anchor="middle" font-size="12" fill="#333">created by:</text>
  <text x="560" y="178" text-anchor="middle" font-size="12" font-family="Consolas, monospace" fill="#c0392b">String s3 = new String("ab");</text>
  <text x="560" y="196" text-anchor="middle" font-size="11" fill="#c0392b">bypasses the pool entirely</text>

  <rect x="60" y="250" width="640" height="80" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="380" y="273" text-anchor="middle" font-size="13" fill="#1a1a1a">s1 == s2 → true (both reference the SAME pooled object)</text>
  <text x="380" y="293" text-anchor="middle" font-size="13" fill="#1a1a1a">s3 == s1 → false (s3 is a distinct heap object, even though contents match)</text>
  <text x="380" y="313" text-anchor="middle" font-size="12" fill="#555">s3.intern() would return the pooled reference, making it == s1 too.</text>
</svg>
