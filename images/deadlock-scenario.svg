<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="holds" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="wants" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Deadlock — Circular Wait Between Two Threads</text>

  <!-- Threads -->
  <circle cx="140" cy="200" r="55" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="140" y="195" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Thread 1</text>
  <text x="140" y="214" text-anchor="middle" font-size="11" fill="#333">(T1)</text>

  <circle cx="620" cy="200" r="55" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="620" y="195" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Thread 2</text>
  <text x="620" y="214" text-anchor="middle" font-size="11" fill="#333">(T2)</text>

  <!-- Locks -->
  <rect x="310" y="90" width="140" height="50" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="380" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Lock A</text>

  <rect x="310" y="280" width="140" height="50" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="380" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Lock B</text>

  <!-- T1 holds A -->
  <path d="M175,175 C 230,140 270,125 308,113" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#holds)"/>
  <text x="230" y="130" font-size="12" fill="#2e7d32" font-weight="600">holds</text>

  <!-- T1 wants B -->
  <path d="M175,225 C 230,260 270,285 308,300" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#wants)"/>
  <text x="215" y="270" font-size="12" fill="#c0392b" font-weight="600">waiting for</text>

  <!-- T2 holds B -->
  <path d="M585,225 C 530,260 490,285 452,300" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#holds)"/>
  <text x="500" y="290" font-size="12" fill="#2e7d32" font-weight="600">holds</text>

  <!-- T2 wants A -->
  <path d="M585,175 C 530,140 490,125 452,113" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#wants)"/>
  <text x="495" y="130" font-size="12" fill="#c0392b" font-weight="600">waiting for</text>

  <!-- Legend -->
  <line x1="230" y1="370" x2="270" y2="370" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="278" y="374" font-size="12" fill="#333">holds (acquired)</text>
  <line x1="430" y1="370" x2="470" y2="370" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="478" y="374" font-size="12" fill="#333">waiting for (blocked)</text>

  <text x="380" y="400" text-anchor="middle" font-size="12" fill="#555">T1 holds A, wants B. T2 holds B, wants A. Neither ever releases — permanent circular wait.</text>
</svg>
