<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="askParent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/>
    </marker>
    <marker id="loadsIt" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Parent-Delegation Model — Requests Go UP Before Loading Goes Down</text>

  <!-- Bootstrap -->
  <rect x="280" y="55" width="200" height="50" rx="6" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/>
  <text x="380" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Bootstrap ClassLoader</text>
  <text x="380" y="93" text-anchor="middle" font-size="11" fill="#333">core JDK classes, native code</text>

  <!-- Platform -->
  <rect x="280" y="140" width="200" height="50" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="380" y="161" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Platform / Extension</text>
  <text x="380" y="178" text-anchor="middle" font-size="11" fill="#333">JDK platform modules</text>

  <!-- Application -->
  <rect x="280" y="225" width="200" height="50" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="380" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Application / System</text>
  <text x="380" y="263" text-anchor="middle" font-size="11" fill="#333">your classpath — default loader for your code</text>

  <!-- Custom -->
  <rect x="280" y="310" width="200" height="50" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="380" y="331" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Custom ClassLoader</text>
  <text x="380" y="348" text-anchor="middle" font-size="11" fill="#333">app servers, plugin systems</text>

  <!-- Ask-parent-first arrows (going up, solid blue) -->
  <path d="M340,308 L340,278" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#askParent)"/>
  <path d="M340,223 L340,193" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#askParent)"/>
  <path d="M340,138 L340,108" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#askParent)"/>
  <text x="220" y="200" font-size="12" fill="#2c5aa0" font-weight="700">1. "can you load this?"</text>
  <text x="220" y="217" font-size="12" fill="#2c5aa0">(delegates UP first, every time)</text>

  <!-- Loads-it-here arrow (coming down, green, only if not found above) -->
  <path d="M420,105 L420,138" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#loadsIt)"/>
  <path d="M420,190 L420,223" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#loadsIt)"/>
  <path d="M420,275 L420,308" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#loadsIt)"/>
  <text x="500" y="200" font-size="12" fill="#2e7d32" font-weight="700">2. only if no ancestor</text>
  <text x="500" y="217" font-size="12" fill="#2e7d32">already has it, load it HERE</text>

  <rect x="40" y="385" width="680" height="25" fill="none"/>
  <text x="380" y="400" text-anchor="middle" font-size="12" fill="#555">Why: prevents a malicious/accidental java.lang.String on your classpath from ever shadowing the JDK's real one.</text>
</svg>
