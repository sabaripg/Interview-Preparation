<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="460" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">API Gateway — Single Entry Point</text>

  <!-- Client -->
  <rect x="40" y="190" width="140" height="70" rx="8" fill="#fff8e1" stroke="#c79a1e" stroke-width="2.5"/>
  <text x="110" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Client</text>

  <!-- Gateway -->
  <rect x="280" y="170" width="200" height="110" rx="8" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2.5"/>
  <text x="380" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">API Gateway</text>
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#333">routing / predicates / filters</text>
  <text x="380" y="240" text-anchor="middle" font-size="11" fill="#333">auth · rate limit · logging</text>
  <text x="380" y="258" text-anchor="middle" font-size="11" fill="#333">(Spring Cloud Gateway)</text>

  <!-- Services -->
  <rect x="580" y="60" width="150" height="60" rx="8" fill="#e9f7ef" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="655" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Order Service</text>

  <rect x="580" y="195" width="150" height="60" rx="8" fill="#e9f7ef" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="655" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">User Service</text>

  <rect x="580" y="330" width="150" height="60" rx="8" fill="#e9f7ef" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="655" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Payment Service</text>

  <!-- Client -> Gateway -->
  <path d="M180,225 L 275,225" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue2)"/>
  <text x="225" y="215" text-anchor="middle" font-size="11" fill="#2c5aa0">/api/**</text>

  <!-- Gateway -> services -->
  <path d="M480,195 C 520,150 550,120 575,95" stroke="#2c5aa0" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue2)"/>
  <text x="500" y="140" font-size="11" fill="#2c5aa0">/orders/**</text>

  <path d="M480,225 L 575,225" stroke="#2c5aa0" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue2)"/>
  <text x="500" y="215" font-size="11" fill="#2c5aa0">/users/**</text>

  <path d="M480,255 C 520,290 550,320 575,355" stroke="#2c5aa0" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue2)"/>
  <text x="495" y="310" font-size="11" fill="#2c5aa0">/payments/**</text>

  <text x="380" y="420" text-anchor="middle" font-size="12" fill="#555">The client only ever talks to the gateway — it never needs to know individual service addresses or ports.</text>
</svg>
