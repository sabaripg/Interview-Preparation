<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pflow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/>
    </marker>
    <marker id="ack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Producer: Key → Partition, and the acks=all Round Trip</text>

  <!-- Producer -->
  <rect x="30" y="70" width="140" height="60" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="100" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">Producer</text>

  <!-- hash box -->
  <rect x="220" y="70" width="160" height="60" rx="6" fill="#fff8e1" stroke="#c79a1e" stroke-width="2"/>
  <text x="300" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">hash(key) % partitions</text>
  <text x="300" y="113" text-anchor="middle" font-size="11" fill="#333">same key → same partition</text>

  <path d="M170,100 L218,100" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#pflow)"/>

  <!-- Partition 1 (leader) -->
  <rect x="440" y="60" width="280" height="50" rx="6" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/>
  <text x="580" y="90" text-anchor="middle" font-size="12" fill="#1a1a1a">Partition 1 leader — write lands here</text>

  <path d="M380,95 L438,85" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#pflow)"/>

  <!-- ack flow -->
  <rect x="440" y="150" width="280" height="50" rx="6" fill="#eef3fb" stroke="#2c5aa0" stroke-width="1.5"/>
  <text x="580" y="180" text-anchor="middle" font-size="12" fill="#1a1a1a">Replicated to ISR followers</text>

  <path d="M580,110 L580,148" stroke="#333" stroke-width="2" fill="none"/>

  <rect x="440" y="240" width="280" height="50" rx="6" fill="#eafaf1" stroke="#2e7d32" stroke-width="2"/>
  <text x="580" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">ISR confirms — ack sent to producer</text>

  <path d="M580,200 L580,238" stroke="#333" stroke-width="2" fill="none"/>

  <path d="M440,265 C 250,300 150,260 100,132" stroke="#2e7d32" stroke-width="2.5" stroke-dasharray="6,4" fill="none" marker-end="url(#ack)"/>
  <text x="230" y="300" font-size="12" fill="#2e7d32" font-weight="700">acks=all: producer waits for THIS</text>

  <rect x="30" y="320" width="690" height="45" rx="6" fill="#f5f5f5" stroke="#999"/>
  <text x="375" y="347" text-anchor="middle" font-size="12" fill="#1a1a1a">acks=0: no wait · acks=1: leader write only · acks=all: full ISR round trip (shown above)</text>
</svg>
