<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c5aa0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c79a1e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="460" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Service Discovery — Registration and Lookup (Eureka)</text>

  <!-- Eureka Server (center top) -->
  <rect x="300" y="60" width="160" height="70" rx="8" fill="#eef3fb" stroke="#2c5aa0" stroke-width="2.5"/>
  <text x="380" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Eureka Server</text>
  <text x="380" y="110" text-anchor="middle" font-size="11" fill="#333">(service registry)</text>

  <!-- Service Instance A (bottom left) -->
  <rect x="70" y="280" width="170" height="70" rx="8" fill="#e9f7ef" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="155" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Service Instance A</text>
  <text x="155" y="330" text-anchor="middle" font-size="11" fill="#333">10.0.1.5:8080</text>

  <!-- Client Service (bottom right) -->
  <rect x="520" y="280" width="170" height="70" rx="8" fill="#fff8e1" stroke="#c79a1e" stroke-width="2.5"/>
  <text x="605" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Client Service</text>
  <text x="605" y="330" text-anchor="middle" font-size="11" fill="#333">(needs Service A)</text>

  <!-- 1. Register -->
  <path d="M200,285 C 250,220 290,170 320,132" stroke="#2e7d32" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="185" y="220" font-size="12" fill="#2e7d32" font-weight="600">1. Register (IP:port)</text>

  <!-- heartbeat dashed -->
  <path d="M175,280 C 200,230 260,180 305,140" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="5,4" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="60" y="255" font-size="11" fill="#2e7d32">heartbeat every 30s</text>

  <!-- 2. Lookup -->
  <path d="M560,132 C 590,190 590,240 610,278" stroke="#c79a1e" stroke-width="2.5" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="565" y="210" font-size="12" fill="#c79a1e" font-weight="600">2. Lookup / fetch registry</text>

  <!-- 3. Direct call -->
  <path d="M520,320 C 400,340 280,340 245,320" stroke="#2c5aa0" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="290" y="360" text-anchor="middle" font-size="12" fill="#2c5aa0" font-weight="600">3. Direct call using resolved IP:port</text>

  <!-- Legend -->
  <line x1="130" y1="410" x2="170" y2="410" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="178" y="414" font-size="12" fill="#333">registration / heartbeat</text>
  <line x1="360" y1="410" x2="400" y2="410" stroke="#c79a1e" stroke-width="2.5"/>
  <text x="408" y="414" font-size="12" fill="#333">registry lookup</text>
  <line x1="530" y1="410" x2="570" y2="410" stroke="#2c5aa0" stroke-width="2.5"/>
  <text x="578" y="414" font-size="12" fill="#333">direct call</text>

  <text x="380" y="445" text-anchor="middle" font-size="12" fill="#555">Eureka never sits in the request path — it only hands out addresses; the client calls the service directly.</text>
</svg>
